<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>RASP Convergence Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body {
    --top-bar-height: 6.75rem;
    --bottom-bar-height: 6rem;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  /* Map fills everything below the top bar and above the opacity bar */
  .map_viewport {
    position: fixed;
    top: var(--top-bar-height);
    left: 0;
    right: 0;
    bottom: var(--bottom-bar-height);
    overflow: hidden;
  }
  .map_container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center center;
    width: 100vw;
  }
  .map_container img {
    width: 100%;
    height: auto;
    display: block;
  }
  #terrain {
    position: static;
  }
  #plot {
    position: absolute;
    left: 0;
    top: 0;
  }
  #osmMap {
    width: 100%;
    height: 100%;
    display: none;
    z-index: 0; /* isolate Leaflet's internal panes (z-index up to 800) so they
                   can't leak out and paint over the crosshair/zoom zones */
  }

  /* Click zones for zoom - cover only the map area (children of the viewport) */
  .zoom_zone {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    z-index: 50;
  }
  #zoomInZone {
    top: 0;
    cursor: zoom-in;
  }
  #zoomOutZone {
    top: 50%;
    cursor: zoom-out;
  }

  /* Full-width top bar: back arrow - big time - forward arrow */
  #timeBar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--top-bar-height);
    z-index: 100;
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.6);
  }
  #title {
    flex: 1;
    text-align: center;
    font-size: 2.2rem;
    font-weight: bold;
    margin: 0;
    white-space: nowrap;
  }
  #timeBar button {
    height: 100%;
    font-size: 3rem;
    padding: 0 2.25rem;
    cursor: pointer;
    border: 0;
    background: rgba(48, 96, 164, 0.9);
    color: #eee;
  }
  #timeBar button:disabled {
    background: rgba(68, 68, 68, 0.9);
    color: #888;
    cursor: not-allowed;
  }

  /* Full-width bottom bar: opacity slider */
  #bottomBar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--bottom-bar-height);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0 1rem;
    background: rgba(0, 0, 0, 0.6);
  }
  #bottomBar input[type=range] {
    flex: 1;
    height: 2rem;
    -webkit-appearance: none;
    appearance: none;
    background: transparent; /* fill colour is set inline by JS */
  }
  #bottomBar input[type=range]::-webkit-slider-runnable-track {
    height: 16px;
    border-radius: 8px;
    background: transparent;
  }
  #bottomBar input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    margin-top: -6px;
    border-radius: 50%;
    background: #3060a4;
    cursor: pointer;
  }
  #bottomBar input[type=range]::-moz-range-track {
    height: 16px;
    border-radius: 8px;
    background: transparent;
  }
  #bottomBar input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 50%;
    background: #3060a4;
    cursor: pointer;
  }

  /* Map style picker, bottom left */
  #mapStyleSelect {
    position: fixed;
    bottom: calc(var(--bottom-bar-height) + 0.5rem);
    left: 0.5rem;
    z-index: 100;
    font-size: 2rem;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    border: 0;
    background: #3060a4;
    color: #eee;
  }

  /* Floating status/coords panel */
  #panel {
    position: fixed;
    top: calc(var(--top-bar-height) + 0.5rem);
    left: 0.5rem;
    z-index: 100;
    background: rgba(0, 0, 0, 0.6);
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    max-width: 300px;
  }
  #panel .status {
    font-size: 0.75rem;
    color: #999;
    margin-bottom: 0.4rem;
  }
  #coords, #realCoords {
    font-size: 0.75rem;
    font-family: monospace;
    color: #ccc;
  }
  .error {
    color: #f66;
    font-family: monospace;
  }

  /* Crosshair marking the exact centre point (the spoofed/geolocated location) */
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 52px;
    height: 52px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 95;
  }
  #crosshair::before, #crosshair::after {
    content: "";
    position: absolute;
    background: #000;
  }
  #crosshair::before {
    top: 50%;
    left: 0;
    width: 100%;
    height: 4px;
    transform: translateY(-50%);
  }
  #crosshair::after {
    left: 50%;
    top: 0;
    width: 4px;
    height: 100%;
    transform: translateX(-50%);
  }
</style>
</head>
<body>
<div class="map_viewport" id="mapViewport">
  <div class="map_container" id="mapContainer">
    <img id="terrain" alt="Terrain">
    <img id="plot" alt="Convergence layer">
  </div>
  <div id="osmMap"></div>
  <div id="zoomInZone" class="zoom_zone" title="Click to zoom in"></div>
  <div id="zoomOutZone" class="zoom_zone" title="Click to zoom out"></div>
  <div id="crosshair"></div>
</div>

<div id="timeBar">
  <button id="hourDown">&larr;</button>
  <h1 id="title">Loading&hellip;</h1>
  <button id="hourUp">&rarr;</button>
</div>

<div id="bottomBar">
  <input type="range" id="opacitySlider" min="0" max="100" value="50">
</div>

<div id="panel">
  <div class="status" id="status"></div>
  <div id="coords"></div>
  <div id="realCoords"></div>
</div>

<select id="mapStyleSelect">
  <option value="osm">OpenStreetMap</option>
  <option value="geographic">Geographic</option>
  <option value="road">Road</option>
</select>

<script>
// Config for the raspuri.mooo.com data source
const FOLDER_ROOT = "https://raspuri.mooo.com/assets/images/Spain6_1";
const PROP = "wblmaxmin"; // Convergencias
const MIN_SITE_HOUR = 6;
const MAX_SITE_HOUR = 20;
const DOMAIN = "d02"; // Sistema Central, 1.2km

// Base map style options: which static layer image to use underneath the overlay
const BASE_LAYERS = {
  geographic: "terrain",
  road: "roads"
};

// Geographic bounds of the FULL d02 domain image, derived by cross-referencing
// 11 known cities (Salamanca, Avila, Madrid, Segovia, etc.) against the site's
// own "cities" marker layer - fit RMS ~2px. Only the full domain (no crop) has
// a verified bounding box, so OpenStreetMap mode is restricted to it.
const OSM_BOUNDS = {
  south: 39.8914,
  north: 41.4398,
  west: -6.3064,
  east: -3.1121
};
const OSM_DEFAULT_CENTER = [
  (OSM_BOUNDS.south + OSM_BOUNDS.north) / 2,
  (OSM_BOUNDS.west + OSM_BOUNDS.east) / 2
];

// Spoofed location used while testing away from Spain (Sierra de Gredos area,
// near Piedrahita). Used whenever the URL doesn't override lat/lon itself.
const SPOOFED_LOCATION = { lat: 40.4978688, lon: -5.230256499999999 };

function pad2(n) {
  return n.toString().padStart(2, "0");
}

// Lower bound for hour navigation: never earlier than the current real-world hour
function nowFloorHour() {
  return Math.min(Math.max(new Date().getUTCHours(), MIN_SITE_HOUR), MAX_SITE_HOUR);
}

function getBaseParams() {
  const q = new URLSearchParams(window.location.search);
  const now = new Date();

  const year = q.get("year") || now.getFullYear();
  const month = pad2(q.get("month") || (now.getMonth() + 1));
  const day = pad2(q.get("day") || now.getDate());
  const hour = parseInt(q.get("hour") || nowFloorHour(), 10);

  let lat = q.get("lat") ? parseFloat(q.get("lat")) : null;
  let lon = q.get("lon") ? parseFloat(q.get("lon")) : null;
  // Only true when the URL itself specified lat/lon - lets us avoid ever
  // writing the default spoofed location back into the URL, where it would
  // wrongly "stick" and override future changes to SPOOFED_LOCATION.
  const explicitLocation = lat != null && lon != null;

  const mapStyle = ["geographic", "road", "osm"].includes(q.get("style")) ? q.get("style") : "osm";

  // Passed through untouched if present, so a manually-bumped ?v= survives
  // our own history.replaceState calls - lets apps like XCTrack that cache
  // by URL be forced to treat it as a fresh page just by incrementing it.
  const v = q.get("v");

  return { domain: DOMAIN, year, month, day, hour, lat, lon, explicitLocation, mapStyle, v };
}

function buildPropUrl({ domain, year, month, day, hour }) {
  return `${FOLDER_ROOT}/${domain}/${year}/${month}/${day}/${pad2(hour)}00_${PROP}.webp`;
}

function buildBaseUrl({ domain, mapStyle }) {
  const layer = BASE_LAYERS[mapStyle] || BASE_LAYERS.geographic;
  return `${FOLDER_ROOT}/${domain}/${layer}.webp`;
}

// The point that zoom always keeps centred: the spoofed/geolocated position
// if we have one, otherwise the middle of the full domain.
function getMapCenter() {
  if (params.lat != null && params.lon != null) return [params.lat, params.lon];
  return OSM_DEFAULT_CENTER;
}

let params = getBaseParams();
// How far back the ← button is allowed to go: up to 10 hours before now,
// but never earlier than the site's own earliest published hour.
const minHour = Math.max(MIN_SITE_HOUR, nowFloorHour() - 10);

const titleEl = document.getElementById("title");
const statusEl = document.getElementById("status");
const coordsEl = document.getElementById("coords");
const realCoordsEl = document.getElementById("realCoords");
const plotEl = document.getElementById("plot");
const terrainEl = document.getElementById("terrain");
const mapContainerEl = document.getElementById("mapContainer");
const osmMapEl = document.getElementById("osmMap");
const hourDownBtn = document.getElementById("hourDown");
const hourUpBtn = document.getElementById("hourUp");
const mapStyleSelect = document.getElementById("mapStyleSelect");
const opacitySlider = document.getElementById("opacitySlider");
const zoomInZone = document.getElementById("zoomInZone");
const zoomOutZone = document.getElementById("zoomOutZone");

const MIN_ZOOM = 1;
const MAX_ZOOM = 4;
const ZOOM_STEP = 0.25;
let zoomLevel = MIN_ZOOM + ZOOM_STEP;

function updateSliderFill() {
  const v = opacitySlider.value;
  opacitySlider.style.background =
    `linear-gradient(to right, #3060a4 0%, #3060a4 ${v}%, #444 ${v}%, #444 100%)`;
}

plotEl.style.opacity = opacitySlider.value / 100;
updateSliderFill();

// Leaflet map + overlay, created lazily the first time OSM mode is used
let leafletMap = null;
let leafletOverlay = null;
function ensureLeafletMap() {
  if (leafletMap) return;
  leafletMap = L.map(osmMapEl, {
    zoomControl: false,
    dragging: false,     // the map always stays centred on the chosen location
    scrollWheelZoom: false,
    minZoom: 7,
    maxZoom: 14
  });
  // CARTO Voyager tiles - same OSM data, larger/clearer labels than the
  // default OSM Mapnik style, plus retina tiles for sharper text.
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
    subdomains: "abcd",
    maxZoom: 20,
    detectRetina: true
  }).addTo(leafletMap);
  const bounds = [[OSM_BOUNDS.south, OSM_BOUNDS.west], [OSM_BOUNDS.north, OSM_BOUNDS.east]];
  leafletOverlay = L.imageOverlay("", bounds, { opacity: opacitySlider.value / 100 }).addTo(leafletMap);
  leafletMap.setView(getMapCenter(), 11);
}

function zoomIn() {
  if (params.mapStyle === "osm") {
    leafletMap.setView(getMapCenter(), leafletMap.getZoom() + 1);
    return;
  }
  if (zoomLevel < MAX_ZOOM) {
    zoomLevel = Math.min(MAX_ZOOM, zoomLevel + ZOOM_STEP);
    applyZoom();
  }
}

function zoomOut() {
  if (params.mapStyle === "osm") {
    leafletMap.setView(getMapCenter(), leafletMap.getZoom() - 1);
    return;
  }
  if (zoomLevel > MIN_ZOOM) {
    zoomLevel = Math.max(MIN_ZOOM, zoomLevel - ZOOM_STEP);
    applyZoom();
  }
}

function applyZoom() {
  mapContainerEl.style.transform = `translate(-50%, -50%) scale(${zoomLevel})`;
}

function updateCoordsDisplay() {
  coordsEl.textContent = (params.lat != null && params.lon != null)
    ? `${params.lat.toFixed(5)}°, ${params.lon.toFixed(5)}°`
    : "location unknown";
}

function render() {
  updateCoordsDisplay();

  const plotUrl = buildPropUrl(params);

  titleEl.textContent = `${pad2(params.hour)}:00z`;

  if (params.mapStyle === "osm") {
    mapContainerEl.style.display = "none";
    osmMapEl.style.display = "block";
    ensureLeafletMap();
    leafletMap.setView(getMapCenter(), leafletMap.getZoom());
    leafletOverlay.setUrl(plotUrl);
    setTimeout(() => leafletMap.invalidateSize(), 0);
  } else {
    osmMapEl.style.display = "none";
    mapContainerEl.style.display = "block";
    const baseUrl = buildBaseUrl(params);
    terrainEl.src = baseUrl;
    plotEl.src = plotUrl;
    plotEl.onerror = () => {
      titleEl.innerHTML = `<span class="error">No data at this location/date/time:<br>${plotUrl}</span>`;
    };
    applyZoom();
  }

  hourDownBtn.disabled = params.hour <= minHour;
  hourUpBtn.disabled = params.hour >= MAX_SITE_HOUR;
  mapStyleSelect.value = params.mapStyle;

  // Reflect current state in the URL for shareability
  const q = new URLSearchParams();
  q.set("style", params.mapStyle);
  q.set("year", params.year);
  q.set("month", params.month);
  q.set("day", params.day);
  q.set("hour", params.hour);
  if (params.explicitLocation) {
    q.set("lat", params.lat);
    q.set("lon", params.lon);
  }
  if (params.v) q.set("v", params.v);
  history.replaceState(null, "", "?" + q.toString());
}

hourDownBtn.addEventListener("click", () => {
  if (params.hour > minHour) {
    params.hour -= 1;
    render();
  }
});

hourUpBtn.addEventListener("click", () => {
  if (params.hour < MAX_SITE_HOUR) {
    params.hour += 1;
    render();
  }
});

mapStyleSelect.addEventListener("change", () => {
  params.mapStyle = mapStyleSelect.value;
  render();
});

opacitySlider.addEventListener("input", () => {
  const v = opacitySlider.value / 100;
  plotEl.style.opacity = v;
  if (leafletOverlay) leafletOverlay.setOpacity(v);
  updateSliderFill();
});

zoomInZone.addEventListener("click", zoomIn);
zoomOutZone.addEventListener("click", zoomOut);

// The map always centres on the spoofed test location (or an explicit
// ?lat=&lon= override) - it never uses live geolocation for that. We still
// fetch real geolocation separately, purely to display as text.
function init() {
  if (params.lat == null || params.lon == null) {
    params.lat = SPOOFED_LOCATION.lat;
    params.lon = SPOOFED_LOCATION.lon;
  }
  statusEl.textContent = `Centred on ${params.lat}, ${params.lon} (spoofed)`;
  render();

  if (navigator.geolocation) {
    realCoordsEl.textContent = "Obtaining real location…";
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        realCoordsEl.textContent =
          `Real location: ${pos.coords.latitude.toFixed(5)}°, ${pos.coords.longitude.toFixed(5)}°`;
      },
      (err) => {
        realCoordsEl.textContent = `Real location unavailable (${err.message})`;
      },
      { timeout: 8000 }
    );
  }
}

init();
</script>
</body>
</html>
